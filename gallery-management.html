<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Management - LexPix</title>
    <link rel="stylesheet" href="css/admin-styles.css">
</head>
<body>
    <div class="menu-overlay"></div>
    <!-- Mobile Navigation -->
    <div class="mobile-nav">
        <div class="mobile-logo">LexPix</div>
        <button class="menu-toggle" onclick="toggleSideMenu()">☰</button>
    </div>

    <div class="admin-container">
        <!-- Side Menu -->
        <nav class="side-menu" id="sideMenu">
            <div class="logo">
                <h2>LexPix<span>.</span></h2>
            </div>
            <ul>
                <li><a href="admin.html">Manage Reviews</a></li>
                <li><a href="gallery-management.html" class="active">Manage Gallery</a></li>
                <li><a href="events-management.html">Manage Events</a></li>
            </ul>
            <button class="logout-btn">Logout</button>
        </nav>

        <!-- Main Content -->
        <main>
            <h2>Gallery Management</h2>
            <div class="form-container">
                <form class="gallery-form" id="galleryForm">
                    <div class="section-header">
                        <h2>Add New Images</h2>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="">Select Category</option>
                            <option value="events">Events</option>
                            <option value="portraits">Portraits</option>
                            <option value="places">Places</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="imageFile">Upload Images</label>
                        <input type="file" id="imageFile" name="imageFile" accept="image/*" multiple required>
                        <div class="image-preview-container" id="imagePreview"></div>
                    </div>
                    <button type="submit" class="submit-btn">Add Images</button>
                </form>
            </div>
            
            <!-- Gallery List -->
            <div class="gallery-list">
                <h2>Current Images</h2>
                <div class="gallery-grid" id="galleryContainer">
                    <!-- Gallery items will be loaded here dynamically -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // Function to handle image preview
        const imageFileInput = document.getElementById('imageFile');
        const imagePreviewContainer = document.getElementById('imagePreview');
        let selectedFiles = [];
    
        imageFileInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            imagePreviewContainer.innerHTML = '';
            selectedFiles = [];
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewItem = document.createElement('div');
                    previewItem.className = 'image-preview-item';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.innerHTML = '×';
                    deleteBtn.onclick = function() {
                        selectedFiles = selectedFiles.filter(f => f !== file);
                        previewItem.remove();
                        
                        if (selectedFiles.length === 0) {
                            imageFileInput.value = '';
                        }
                    };
                    
                    previewItem.appendChild(img);
                    previewItem.appendChild(deleteBtn);
                    imagePreviewContainer.appendChild(previewItem);
                    
                    selectedFiles.push(file);
                };
                reader.readAsDataURL(file);
            });
        });
    
        // Function to add new image to gallery
        document.getElementById('galleryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('imageTitle').value;
            const category = document.getElementById('category').value;
            const file = document.getElementById('imageFile').files[0];
    
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const galleryItem = {
                        title: title,
                        category: category,
                        image: e.target.result,
                        id: Date.now()
                    };
    
                    // Get existing gallery items
                    const galleryItems = JSON.parse(localStorage.getItem('galleryItems')) || [];
                    galleryItems.push(galleryItem);
                    localStorage.setItem('galleryItems', JSON.stringify(galleryItems));
    
                    // Reset form and refresh gallery
                    document.getElementById('galleryForm').reset();
                    imagePreviewContainer.innerHTML = '';
                    loadGallery();
                };
                reader.readAsDataURL(file);
            }
        });
    
        // Function to load gallery items
        function loadGallery() {
            const galleryContainer = document.getElementById('galleryContainer');
            const galleryItems = JSON.parse(localStorage.getItem('galleryItems')) || [];
            
            galleryContainer.innerHTML = '';
            
            galleryItems.forEach((item) => {
                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item';
                galleryItem.innerHTML = `
                    <img src="${item.image}" alt="${item.title}">
                    <div class="item-details">
                        <h3>${item.title}</h3>
                        <p>Category: ${item.category}</p>
                        <div class="actions">
                            <button onclick="deleteGalleryItem(${item.id})" class="delete-btn">Delete</button>
                        </div>
                    </div>
                `;
                galleryContainer.appendChild(galleryItem);
            });
        }
    
        // Function to delete gallery item
        function deleteGalleryItem(id) {
            if (confirm('Are you sure you want to delete this image?')) {
                let galleryItems = JSON.parse(localStorage.getItem('galleryItems')) || [];
                galleryItems = galleryItems.filter(item => item.id !== id);
                localStorage.setItem('galleryItems', JSON.stringify(galleryItems));
                loadGallery();
            }
        }
    
        // Load gallery when page loads
        document.addEventListener('DOMContentLoaded', loadGallery);
    
        // Keep existing toggleSideMenu function
        function toggleSideMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        function toggleSideMenu() {
    const sideMenu = document.getElementById('sideMenu');
    const overlay = document.querySelector('.menu-overlay');
    sideMenu.classList.toggle('active');
    if (overlay) {
        overlay.classList.toggle('active');
    }
}

// Close menu when clicking outside
document.addEventListener('click', function(e) {
    const sideMenu = document.getElementById('sideMenu');
    const hamburger = document.querySelector('.menu-toggle');
    if (!sideMenu.contains(e.target) && !hamburger.contains(e.target) && sideMenu.classList.contains('active')) {
        sideMenu.classList.remove('active');
        document.querySelector('.menu-overlay').classList.remove('active');
    }
});
    </script>
</body>
</html>
