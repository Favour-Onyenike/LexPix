<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Management - LexPix</title>
    
    <style>
        /* Global Styles */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
        }

        /* Admin Container */
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* Side Menu */
        .side-menu {
            width: 250px;
            background-color: #2c3e50;
            color: #fff;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .side-menu .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .side-menu .logo h2 {
            font-size: 24px;
            margin: 0;
        }

        .side-menu .logo span {
            color: #3498db;
        }

        .side-menu ul {
            list-style: none;
            padding: 0;
        }

        .side-menu ul li {
            margin: 15px 0;
        }

        .side-menu ul li a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            display: block;
            padding: 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .side-menu ul li a:hover,
        .side-menu ul li a.active {
            background-color: #34495e;
            color: #3498db;
        }

        .side-menu .logout-btn {
            background-color: #e74c3c;
            color: #fff;
            border: none;
            padding: 10px 20px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
        }

        /* Mobile Navigation */
        .mobile-nav {
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px; /* Increased right padding */
            background-color: #2c3e50;
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }
        .mobile-nav {
         display: none; /* Default state is hidden */
        }
        .mobile-nav .mobile-logo {
            font-size: 20px;
        }
        .menu-toggle {
            margin-right: 40px; /* Added margin to the right */
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        /* Mobile Side Menu Hidden */
        @media (max-width: 768px) {
            .side-menu {
                position: fixed;
                left: -100%;
                top: 0;
                height: 100vh;
                z-index: 1000;
                width: 250px;
                transition: all 0.3s ease;
                visibility: hidden;
            }

            .side-menu.active {
                left: 0;
                visibility: visible; 
                box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2)
            }

            .mobile-nav {
                display: flex;
                width: 100%;
                position: fixed;
                top: 0;
                left: 0;
                z-index: 999
            }
            .menu-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 999;
            }
            .menu-overlay.active {
                display: block;
            }
            main {
                margin-left: 0;
                padding: 10px;
                width: 100%;
                margin-top: 60px; /* Space for mobile nav */
            }
        }

        /* Content */
        main {
            flex-grow: 1;
            padding: 20px;
        }

        .form-container {
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .submit-btn {
            background-color: #3498db;
            color: #fff;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .submit-btn:hover {
            background-color: #2980b9;
        }

        .gallery-list {
            margin-top: 30px;
        }

        .gallery-item {
            background: #fff;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
        }

        .actions button {
            background-color: #e74c3c;
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
        }

        .actions button:hover {
            background-color: #c0392b;
        }

        /* Image Preview */
        .image-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .image-preview-item {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 5px;
            border: 1px solid #ddd;
            overflow: hidden;
        }

        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview-item .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: rgba(255, 0, 0, 0.7);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        .image-preview-item .delete-btn:hover {
            background-color: rgba(255, 0, 0, 1);
        }

        @media (max-width: 768px) {
            .admin-container {
                flex-direction: column;
            }

            .form-container {
                margin: 10px;
                padding: 15px;
            }

            .gallery-item {
                margin: 10px;
            }

            .image-preview-container {
                gap: 5px;
            }

            .image-preview-item {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="menu-overlay"></div>

    <!-- Mobile Navigation -->
    <div class="mobile-nav">
        <div class="mobile-logo">LexPix</div>
        <button class="menu-toggle" onclick="toggleSideMenu()">☰</button>
    </div>

    <div class="admin-container">
        <!-- Side Menu -->
        <nav class="side-menu" id="sideMenu">
            <div class="logo">
                <h2>LexPix</h2>
            </div>
            <ul>
                <li><a href="admin.html">Manage Reviews</a></li>
                <li><a href="gallery-management.html"class="active">Manage Gallery</a></li>
                <li><a href="events-management.html" >Manage Events</a></li>
            </ul>
            <button class="logout-btn">Logout</button>
        </nav>

        <!-- Main Content -->
        <main>
            <h2>Gallery Management</h2>

            <!-- Add Gallery Form -->
            <div class="form-container">
                <form class="add-gallery-form" id="galleryForm">
                    <div class="section-header">
                        <h2>Add New Images</h2>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="">Select Category</option>
                            <option value="events">Events</option>
                            <option value="portraits">Portraits</option>
                            <option value="places">Places</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="imageFile">Upload Images</label>
                        <input type="file" id="imageFile" name="imageFile" accept="image/*" multiple required>
                        <div class="image-preview-container" id="imagePreview"></div>
                    </div>
                    <button type="submit" class="submit-btn">Add Images</button>
                </form>
            </div>

            <!-- Gallery List -->
            <div class="gallery-list">
                <h2>Current Images</h2>
                <div id="galleryContainer">
                    <!-- Gallery items will be loaded here dynamically -->
                </div>
            </div>
        </main>
    </div>

    <!-- JavaScript -->
    <script>
        // Function to handle image preview
        const imageFileInput = document.getElementById('imageFile');
        const imagePreviewContainer = document.getElementById('imagePreview');
        let selectedFiles = [];

        imageFileInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            imagePreviewContainer.innerHTML = '';
            selectedFiles = [];

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewItem = document.createElement('div');
                    previewItem.className = 'image-preview-item';

                    const img = document.createElement('img');
                    img.src = e.target.result;

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.innerHTML = '×';
                    deleteBtn.onclick = function() {
                        selectedFiles = selectedFiles.filter(f => f !== file);
                        previewItem.remove();

                        if (selectedFiles.length === 0) {
                            imageFileInput.value = '';
                        }
                    };

                    previewItem.appendChild(img);
                    previewItem.appendChild(deleteBtn);
                    imagePreviewContainer.appendChild(previewItem);

                    selectedFiles.push(file);
                };
                reader.readAsDataURL(file);
            });
        });

        // Function to add new image to gallery
        document.getElementById('galleryForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const category = document.getElementById('category').value;
            const files = Array.from(document.getElementById('imageFile').files);

            if (files.length > 0) {
                const galleryItems = JSON.parse(localStorage.getItem('galleryItems')) || [];

                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const galleryItem = {
                            category: category,
                            image: e.target.result,
                            id: Date.now()
                        };

                        galleryItems.push(galleryItem);
                        localStorage.setItem('galleryItems', JSON.stringify(galleryItems));

                        // Update gallery list
                        displayGallery();
                    };
                    reader.readAsDataURL(file);
                });

                // Reset form
                document.getElementById('galleryForm').reset();
                imagePreviewContainer.innerHTML = '';
                selectedFiles = [];
            }
        });

        // Function to load gallery items
        function displayGallery() {
            const galleryContainer = document.getElementById('galleryContainer');
            const galleryItems = JSON.parse(localStorage.getItem('galleryItems')) || [];

            galleryContainer.innerHTML = '';

            galleryItems.forEach((item, index) => {
                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item';
                galleryItem.innerHTML = `
                    <div class="image-preview-item">
                        <img src="${item.image}" alt="Gallery Image">
                    </div>
                    <div class="item-details">
                        <h3>Category: ${item.category}</h3>
                        <div class="actions">
                            <button onclick="deleteGalleryItem(${index})" class="delete-btn">Delete</button>
                        </div>
                    </div>
                `;
                galleryContainer.appendChild(galleryItem);
            });
        }

        // Function to delete gallery item
        function deleteGalleryItem(index) {
            if (confirm('Are you sure you want to delete this image?')) {
                const galleryItems = JSON.parse(localStorage.getItem('galleryItems')) || [];
                galleryItems.splice(index, 1);
                localStorage.setItem('galleryItems', JSON.stringify(galleryItems));
                displayGallery();
            }
        }

        // Load gallery when page loads
        document.addEventListener('DOMContentLoaded', displayGallery);

        // Mobile menu toggle
        function toggleSideMenu() {
            const sideMenu = document.getElementById('sideMenu');
            const overlay = document.querySelector('.menu-overlay');
            sideMenu.classList.toggle('active');
            if (overlay) {
                overlay.classList.toggle('active');
            }
        }

        // Logout button functionality
        document.addEventListener("DOMContentLoaded", function () {
            const logoutButton = document.querySelector(".logout-btn");
            if (logoutButton) {
                logoutButton.addEventListener("click", function () {
                    // Redirect to index.html
                    window.location.href = "index.html";
                });
            }
        });
    </script>
</body>
</html>
